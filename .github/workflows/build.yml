name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          VERSION_NAME=$(echo $VERSION | cut -d'+' -f1)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          VERSION_CODE=$(echo $VERSION | cut -d'+' -f2)
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Recreate Android project
        run: |
          rm -rf android
          cp pubspec.yaml pubspec.yaml.bak
          flutter create . --platforms=android --project-name=lingostream
          mv pubspec.yaml.bak pubspec.yaml

      - name: Fix minSdkVersion, Kotlin and ML Kit
        run: |
          sed -i 's/minSdkVersion .*/minSdkVersion 23/g' android/app/build.gradle
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24"/g' android/settings.gradle || true
          sed -i "s/id 'org.jetbrains.kotlin.android' version '[^']*'/id 'org.jetbrains.kotlin.android' version '1.9.24'/g" android/settings.gradle || true
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' android/build.gradle || true
          sed -i '/^dependencies {/a\ implementation "com.google.mlkit:text-recognition:16.0.1"\n implementation "com.google.mlkit:text-recognition-common:18.0.0"' android/app/build.gradle

      - name: Write AndroidManifest.xml
        run: |
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION"/>
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              
              <application
                  android:label="LingoStream AI"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>
                  <service
                      android:name=".ScreenCaptureService"
                      android:foregroundServiceType="mediaProjection"
                      android:exported="false"/>
              </application>
          </manifest>
          MANIFEST_EOF

      - name: Write MainActivity.kt
        run: |
          mkdir -p android/app/src/main/kotlin/com/example/lingostream
          cat > android/app/src/main/kotlin/com/example/lingostream/MainActivity.kt << 'MAIN_EOF'
          package com.example.lingostream

          import android.app.Activity
          import android.content.Context
          import android.content.Intent
          import android.media.projection.MediaProjectionManager
          import android.net.Uri
          import android.os.Build
          import android.provider.Settings
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.example.lingostream/capture"
              private val REQUEST_MEDIA_PROJECTION = 1001
              private lateinit var channel: MethodChannel
              private var pendingResult: MethodChannel.Result? = null
              private var currentMode: String = "movie"
              private var targetLang: String = "uk"
              private var sourceLang: String = "en"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  channel = MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL)
                  channel.setMethodCallHandler { call, result ->
                      when (call.method) {
                          "startCapture" -> {
                              currentMode = call.argument<String>("mode") ?: "movie"
                              targetLang = call.argument<String>("targetLang") ?: "uk"
                              sourceLang = call.argument<String>("sourceLang") ?: "en"
                              pendingResult = result
                              startCapture()
                          }
                          "stopCapture" -> {
                              startService(Intent(this, ScreenCaptureService::class.java).apply { action = "STOP" })
                              result.success(null)
                          }
                          "hasOverlayPermission" -> result.success(Settings.canDrawOverlays(this))
                          "requestOverlayPermission" -> {
                              startActivity(Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:$packageName")))
                              result.success(null)
                          }
                          "updateSettings" -> {
                              currentMode = call.argument<String>("mode") ?: currentMode
                              targetLang = call.argument<String>("targetLang") ?: targetLang
                              sourceLang = call.argument<String>("sourceLang") ?: sourceLang
                              val service = Intent(this, ScreenCaptureService::class.java).apply {
                                  action = "UPDATE_SETTINGS"
                                  putExtra("mode", currentMode)
                                  putExtra("targetLang", targetLang)
                                  putExtra("sourceLang", sourceLang)
                              }
                              startService(service)
                              result.success(null)
                          }
                          else -> result.notImplemented()
                      }
                  }
              }

              private fun startCapture() {
                  if (!Settings.canDrawOverlays(this)) {
                      pendingResult?.error("NO_OVERLAY", "Overlay permission required", null)
                      pendingResult = null
                      return
                  }
                  val mgr = getSystemService(Context.MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                  startActivityForResult(mgr.createScreenCaptureIntent(), REQUEST_MEDIA_PROJECTION)
              }

              override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                  super.onActivityResult(requestCode, resultCode, data)
                  if (requestCode == REQUEST_MEDIA_PROJECTION) {
                      if (resultCode == Activity.RESULT_OK && data != null) {
                          val intent = Intent(this, ScreenCaptureService::class.java).apply {
                              action = "START"
                              putExtra("resultCode", resultCode)
                              putExtra("data", data)
                              putExtra("mode", currentMode)
                              putExtra("targetLang", targetLang)
                              putExtra("sourceLang", sourceLang)
                          }
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) startForegroundService(intent)
                          else startService(intent)
                          pendingResult?.success(true)
                      } else {
                          pendingResult?.success(false)
                      }
                      pendingResult = null
                  }
              }
          }
          MAIN_EOF

      - name: Write ScreenCaptureService.kt
        run: |
          cat > android/app/src/main/kotlin/com/example/lingostream/ScreenCaptureService.kt << 'SERVICE_EOF'
          package com.example.lingostream

          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.PendingIntent
          import android.app.Service
          import android.content.Context
          import android.content.Intent
          import android.graphics.Bitmap
          import android.graphics.PixelFormat
          import android.hardware.display.DisplayManager
          import android.hardware.display.VirtualDisplay
          import android.media.ImageReader
          import android.media.projection.MediaProjection
          import android.media.projection.MediaProjectionManager
          import android.os.Build
          import android.os.Handler
          import android.os.HandlerThread
          import android.os.Looper
          import android.util.DisplayMetrics
          import android.view.Gravity
          import android.view.WindowManager
          import android.widget.TextView
          import androidx.core.app.NotificationCompat
          import com.google.mlkit.vision.common.InputImage
          import com.google.mlkit.vision.text.TextRecognition
          import com.google.mlkit.vision.text.latin.TextRecognizerOptions
          import java.net.HttpURLConnection
          import java.net.URL
          import java.net.URLEncoder
          import org.json.JSONObject

          class ScreenCaptureService : Service() {
              private var mediaProjection: MediaProjection? = null
              private var virtualDisplay: VirtualDisplay? = null
              private var imageReader: ImageReader? = null
              private var overlayView: TextView? = null
              private val mainHandler = Handler(Looper.getMainLooper())
              private val bgThread = HandlerThread("LingoBG").also { it.start() }
              private val bgHandler = Handler(bgThread.looper)
              private var isRunning = false
              private var lastText = ""
              private var currentMode: String = "movie"
              private var targetLang: String = "uk"
              private var sourceLang: String = "en"
              
              private val recognizer = TextRecognition.getClient(TextRecognizerOptions.DEFAULT_OPTIONS)
              
              private var captureIntervalMs: Long = 3000
              
              private val captureRunnable = object : Runnable {
                  override fun run() {
                      if (isRunning) {
                          doCapture()
                          bgHandler.postDelayed(this, captureIntervalMs)
                      }
                  }
              }

              override fun onCreate() {
                  super.onCreate()
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val ch = NotificationChannel("LingoStream", "LingoStream", NotificationManager.IMPORTANCE_LOW)
                      getSystemService(NotificationManager::class.java)?.createNotificationChannel(ch)
                  }
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  when (intent?.action) {
                      "START" -> {
                          currentMode = intent.getStringExtra("mode") ?: "movie"
                          targetLang = intent.getStringExtra("targetLang") ?: "uk"
                          sourceLang = intent.getStringExtra("sourceLang") ?: "en"
                          
                          captureIntervalMs = when (currentMode) {
                              "rock" -> 2000L
                              "pop" -> 2500L
                              else -> 3000L
                          }
                          
                          startForeground(1, buildNotification())
                          
                          val resultCode = intent.getIntExtra("resultCode", -1)
                          val data: Intent? = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                              intent.getParcelableExtra("data", Intent::class.java)
                          else
                              @Suppress("DEPRECATION") intent.getParcelableExtra("data")
                          
                          if (data != null) {
                              val mgr = getSystemService(Context.MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                              mediaProjection = mgr.getMediaProjection(resultCode, data)
                              initCapture()
                              initOverlay()
                              isRunning = true
                              bgHandler.postDelayed(captureRunnable, 1500)
                          }
                      }
                      "UPDATE_SETTINGS" -> {
                          currentMode = intent.getStringExtra("mode") ?: currentMode
                          targetLang = intent.getStringExtra("targetLang") ?: targetLang
                          sourceLang = intent.getStringExtra("sourceLang") ?: sourceLang
                          
                          captureIntervalMs = when (currentMode) {
                              "rock" -> 2000L
                              "pop" -> 2500L
                              else -> 3000L
                          }
                      }
                      "STOP" -> {
                          isRunning = false
                          cleanup()
                          stopForeground(STOP_FOREGROUND_REMOVE)
                          stopSelf()
                      }
                  }
                  return START_NOT_STICKY
              }

              private fun initCapture() {
                  val wm = getSystemService(Context.WINDOW_SERVICE) as WindowManager
                  val metrics = DisplayMetrics()
                  @Suppress("DEPRECATION") wm.defaultDisplay.getRealMetrics(metrics)
                  imageReader = ImageReader.newInstance(metrics.widthPixels, metrics.heightPixels, PixelFormat.RGBA_8888, 2)
                  virtualDisplay = mediaProjection?.createVirtualDisplay(
                      "LingoCapture",
                      metrics.widthPixels, metrics.heightPixels, metrics.densityDpi,
                      DisplayManager.VIRTUAL_DISPLAY_FLAG_AUTO_MIRROR,
                      imageReader?.surface, null, null
                  )
              }

              private fun initOverlay() {
                  val wm = getSystemService(Context.WINDOW_SERVICE) as WindowManager
                  overlayView = TextView(this).apply {
                      text = "🛸 LingoStream: ${currentMode.uppercase()}"
                      textSize = 16f
                      setTextColor(android.graphics.Color.WHITE)
                      setBackgroundColor(android.graphics.Color.parseColor("#DD000000"))
                      setPadding(24, 14, 24, 14)
                  }
                  val type = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY
                  else
                      @Suppress("DEPRECATION") WindowManager.LayoutParams.TYPE_PHONE
                  val params = WindowManager.LayoutParams(
                      WindowManager.LayoutParams.MATCH_PARENT,
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      type,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE or WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL,
                      PixelFormat.TRANSLUCENT
                  ).apply {
                      gravity = Gravity.BOTTOM or Gravity.CENTER_HORIZONTAL
                      y = 120
                  }
                  mainHandler.post { wm.addView(overlayView, params) }
              }

              private fun doCapture() {
                  val image = try { imageReader?.acquireLatestImage() } catch (e: Exception) { null } ?: return
                  try {
                      val plane = image.planes[0]
                      val rowPadding = plane.rowStride - plane.pixelStride * image.width
                      val full = Bitmap.createBitmap(
                          image.width + rowPadding / plane.pixelStride,
                          image.height, Bitmap.Config.ARGB_8888
                      )
                      full.copyPixelsFromBuffer(plane.buffer)
                      
                      val cropTop = (full.height * 0.55f).toInt()
                      val cropH = (full.height * 0.38f).toInt()
                      val cropped = Bitmap.createBitmap(full, 0, cropTop, full.width, cropH)
                      full.recycle()
                      
                      recognizer.process(InputImage.fromBitmap(cropped, 0))
                          .addOnSuccessListener { result ->
                              val text = result.text.trim()
                              if (text.isNotEmpty() && text != lastText && text.length > 3) {
                                  lastText = text
                                  bgHandler.post {
                                      val translated = translate(text)
                                      mainHandler.post { 
                                          overlayView?.text = "🌐 $translated" 
                                      }
                                  }
                              }
                              cropped.recycle()
                          }
                          .addOnFailureListener { cropped.recycle() }
                  } finally {
                      image.close()
                  }
              }

              private fun translate(text: String): String {
                  return try {
                      val encoded = URLEncoder.encode(text.take(400), "UTF-8")
                      val langPair = "$sourceLang|$targetLang"
                      val url = URL("https://api.mymemory.translated.net/get?q=$encoded&langpair=$langPair")
                      val conn = url.openConnection() as HttpURLConnection
                      conn.connectTimeout = 5000
                      conn.readTimeout = 5000
                      val resp = conn.inputStream.bufferedReader().readText()
                      conn.disconnect()
                      JSONObject(resp).getJSONObject("responseData").getString("translatedText")
                  } catch (e: Exception) { text }
              }

              private fun cleanup() {
                  bgHandler.removeCallbacks(captureRunnable)
                  virtualDisplay?.release()
                  mediaProjection?.stop()
                  imageReader?.close()
                  recognizer.close()
                  mainHandler.post {
                      overlayView?.let { v ->
                          try {
                              (getSystemService(Context.WINDOW_SERVICE) as WindowManager).removeView(v)
                          } catch (_: Exception) {}
                      }
                  }
              }

              private fun buildNotification(): Notification {
                  val stopIntent = PendingIntent.getService(
                      this, 0,
                      Intent(this, ScreenCaptureService::class.java).apply { action = "STOP" },
                      PendingIntent.FLAG_IMMUTABLE
                  )
                  return NotificationCompat.Builder(this, "LingoStream")
                      .setContentTitle("🛸 LingoStream AI")
                      .setContentText("$sourceLang → $targetLang | Mode: $currentMode")
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .addAction(android.R.drawable.ic_delete, "Stop", stopIntent)
                      .setOngoing(true)
                      .build()
              }

              override fun onBind(intent: Intent?) = null

              override fun onDestroy() {
                  isRunning = false
                  cleanup()
                  bgThread.quitSafely()
                  super.onDestroy()
              }
          }
          SERVICE_EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: |
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/LingoStream-${{ steps.version.outputs.version }}.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: LingoStream AI v${{ steps.version.outputs.version_name }}
          body: |
            ## What's New
            
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
            
            **Version:** ${{ steps.version.outputs.version }}
            
            ---

            ### Installation
            1. Download the APK below
            2. Enable "Install from unknown sources" in Android settings
            3. Open the APK file to install
          files: |
            build/app/outputs/flutter-apk/LingoStream-${{ steps.version.outputs.version }}.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LingoStream-APK
          path: build/app/outputs/flutter-apk/LingoStream-${{ steps.version.outputs.version }}.apk
          retention-days: 7
