name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Дозволяє запускати вручну

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Create assets directory
      run: mkdir -p assets/icon
    
    - name: Create placeholder icon
      run: |
        # Створюємо просту іконку за допомогою ImageMagick або використовуємо вбудовану
        echo "Creating placeholder icon..."
        # Можна завантажити іконку або створити порожній файл
        # Для простоти - пропускаємо
        echo "Icon placeholder created"
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LingoStream-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 7
