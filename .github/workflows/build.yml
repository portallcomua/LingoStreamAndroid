name: Build LingoStream APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Recreate Android Project files
        run: |
          # Створюємо Android-проект
          flutter create . --platforms=android --project-name=lingostream

      - name: Update Kotlin version for modern packages
        run: |
          # Цей крок примусово оновлює версію Kotlin у згенерованому Gradle файлі
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' android/build.gradle
          # Оновлюємо версію плагіну Kotlin, якщо структура використовує новий формат
          sed -i 's/org.jetbrains.kotlin.android" version .*/org.jetbrains.kotlin.android" version "1.9.24" apply false/g' android/settings.gradle || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lingostream-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
