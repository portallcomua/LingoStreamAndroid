name: Build LingoStream APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Prepare Flutter Android project
        run: |
          flutter --version
          flutter pub get
          flutter create --platforms=android .
          
          # Автоматичне налаштування AdMob та minSdkVersion після генерації папки android
          python3 -c "
          import os
          import re

          # 1. Додавання AdMob App ID в AndroidManifest.xml у правильне місце
          manifest_path = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(manifest_path):
              with open(manifest_path, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # Створюємо блок метаданих AdMob та закриваємо тег application
              admob_tag = '\n        <meta-data\n            android:name=\"com.google.android.gms.ads.APPLICATION_ID\"\n            android:value=\"ca-app-pub-3940256099942544~3347511713\"/>\n    </application>'
              
              if 'com.google.android.gms.ads.APPLICATION_ID' not in content:
                  content = content.replace('</application>', admob_tag)
                  with open(manifest_path, 'w', encoding='utf-8') as f:
                      f.write(content)
                  print('✅ AndroidManifest.xml успішно оновлено тестовим AdMob App ID.')

          # 2. Оновлення minSdkVersion до 21 для підтримки Google ML Kit
          gradle_path = 'android/app/build.gradle'
          if os.path.exists(gradle_path):
              with open(gradle_path, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # Заміна версії minSdkVersion на 21 з урахуванням різних можливих форматів запису
              content = re.sub(r'minSdkVersion\s+flutter\.minSdkVersion', 'minSdkVersion 21', content)
              content = re.sub(r'minSdkVersion\s*=\s*flutter\.minSdkVersion', 'minSdkVersion = 21', content)
              content = re.sub(r'minSdkVersion\s+localProperties\.getProperty\([^\)]+\)', 'minSdkVersion 21', content)
              content = re.sub(r'minSdkVersion\s*=\s*localProperties\.getProperty\([^\)]+\)', 'minSdkVersion = 21', content)
              
              with open(gradle_path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print('✅ build.gradle успішно оновлено (minSdkVersion встановлено на 21).')
          "

      - name: Generate Launcher Icons
        run: dart run flutter_launcher_icons

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LingoStream-APK
          path: build/app/outputs/flutter-apk/app-release.apk
