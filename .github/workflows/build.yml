name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Create new Flutter project
      run: |
        cd ..
        flutter create --platforms=android --org com.lingostream temp_project
        cp -r temp_project/android LingoStreamAndroid/
        cp -r temp_project/ios LingoStreamAndroid/ 2>/dev/null || true
        cd LingoStreamAndroid
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LingoStream-APK
        path: build/app/outputs/flutter-apk/app-release.apk
