name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Flutter 3.22
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable

      - name: Recreate Android project
        run: |
          rm -rf android
          cp pubspec.yaml pubspec.yaml.bak
          flutter create . --platforms=android --project-name=lingostream
          mv pubspec.yaml.bak pubspec.yaml

      - name: Patch app/build.gradle
        run: |
          sed -i 's/minSdk flutter.minSdkVersion/minSdk 23/' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' android/app/build.gradle
          sed -i '/^dependencies {/a\    implementation "com.google.mlkit:text-recognition:16.0.0"' android/app/build.gradle
          echo "=== build.gradle deps ==="
          grep -E "minSdk|mlkit|dependencies" android/app/build.gradle

      - name: Fix Kotlin version
        run: |
          sed -i 's/version \"1\.[0-9]*\.[0-9]*/version \"1.9.24/g' android/settings.gradle
          grep "kotlin.android" android/settings.gradle

      - name: Write AndroidManifest
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.lingostream">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION" />
              <application
                  android:label="LingoStream AI"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <meta-data
                      android:name="com.google.android.gms.ads.APPLICATION_ID"
                      android:value="ca-app-pub-3940256099942544~3347511713"/>
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".ScreenCaptureService"
                      android:foregroundServiceType="mediaProjection"
                      android:exported="false"/>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          MANIFEST

      - name: Write MainActivity.kt
        run: |
          mkdir -p android/app/src/main/kotlin/com/example/lingostream
          cat > android/app/src/main/kotlin/com/example/lingostream/MainActivity.kt << 'KOTLIN'
          package com.example.lingostream
          import android.app.Activity
          import android.content.Context
          import android.content.Intent
          import android.media.projection.MediaProjectionManager
          import android.net.Uri
          import android.os.Build
          import android.provider.Settings
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel
          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.example.lingostream/capture"
              private val REQ = 1001
              private lateinit var ch: MethodChannel
              private var pending: MethodChannel.Result? = null
              override fun configureFlutterEngine(fe: FlutterEngine) {
                  super.configureFlutterEngine(fe)
                  ch = MethodChannel(fe.dartExecutor.binaryMessenger, CHANNEL)
                  ch.setMethodCallHandler { call, result ->
                      when (call.method) {
                          "startCapture" -> { pending = result; startCap() }
                          "stopCapture" -> {
                              startService(Intent(this, ScreenCaptureService::class.java).apply { action = "STOP" })
                              result.success(null)
                          }
                          "hasOverlayPermission" -> result.success(Settings.canDrawOverlays(this))
                          "requestOverlayPermission" -> {
                              startActivity(Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:$packageName")))
                              result.success(null)
                          }
                          else -> result.notImplemented()
                      }
                  }
              }
              private fun startCap() {
                  if (!Settings.canDrawOverlays(this)) {
                      pending?.error("NO_OVERLAY", "Need overlay permission", null)
                      pending = null; return
                  }
                  val mgr = getSystemService(Context.MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                  startActivityForResult(mgr.createScreenCaptureIntent(), REQ)
              }
              override fun onActivityResult(req: Int, res: Int, data: Intent?) {
                  super.onActivityResult(req, res, data)
                  if (req == REQ) {
                      if (res == Activity.RESULT_OK && data != null) {
                          val i = Intent(this, ScreenCaptureService::class.java).apply {
                              action = "START"; putExtra("resultCode", res); putExtra("data", data)
                          }
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) startForegroundService(i)
                          else startService(i)
                          pending?.success(true)
                      } else { pending?.success(false) }
                      pending = null
                  }
              }
          }
          KOTLIN

      - name: Write ScreenCaptureService.kt
        run: |
          cat > android/app/src/main/kotlin/com/example/lingostream/ScreenCaptureService.kt << 'KOTLIN'
          package com.example.lingostream
          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.PendingIntent
          import android.app.Service
          import android.content.Context
          import android.content.Intent
          import android.graphics.Bitmap
          import android.graphics.PixelFormat
          import android.hardware.display.DisplayManager
          import android.hardware.display.VirtualDisplay
          import android.media.ImageReader
          import android.media.projection.MediaProjection
          import android.media.projection.MediaProjectionManager
          import android.os.Build
          import android.os.Handler
          import android.os.HandlerThread
          import android.os.Looper
          import android.util.DisplayMetrics
          import android.view.Gravity
          import android.view.WindowManager
          import android.widget.TextView
          import androidx.core.app.NotificationCompat
          import com.google.mlkit.vision.common.InputImage
          import com.google.mlkit.vision.text.Text
          import com.google.mlkit.vision.text.TextRecognition
          import com.google.mlkit.vision.text.latin.TextRecognizerOptions
          import java.net.HttpURLConnection
          import java.net.URL
          import java.net.URLEncoder
          import org.json.JSONObject
          class ScreenCaptureService : Service() {
              private var proj: MediaProjection? = null
              private var vd: VirtualDisplay? = null
              private var ir: ImageReader? = null
              private var overlay: TextView? = null
              private val main = Handler(Looper.getMainLooper())
              private val bgt = HandlerThread("LingoBG").also { it.start() }
              private val bg = Handler(bgt.looper)
              private var running = false
              private var lastTxt = ""
              private val ocr = TextRecognition.getClient(TextRecognizerOptions.DEFAULT_OPTIONS)
              private val loop = object : Runnable {
                  override fun run() { if (running) { capture(); bg.postDelayed(this, 1000L) } }
              }
              override fun onCreate() {
                  super.onCreate()
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val ch = NotificationChannel("LS", "LingoStream", NotificationManager.IMPORTANCE_LOW)
                      getSystemService(NotificationManager::class.java)?.createNotificationChannel(ch)
                  }
              }
              override fun onStartCommand(intent: Intent?, flags: Int, id: Int): Int {
                  when (intent?.action) {
                      "START" -> {
                          startForeground(1, buildNotif())
                          val rc = intent.getIntExtra("resultCode", -1)
                          val data: Intent? = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU)
                              intent.getParcelableExtra("data", Intent::class.java)
                          else @Suppress("DEPRECATION") intent.getParcelableExtra("data")
                          if (data != null) {
                              proj = (getSystemService(Context.MEDIA_PROJECTION_SERVICE) as MediaProjectionManager).getMediaProjection(rc, data)
                              initDisplay(); initOverlay(); running = true; bg.postDelayed(loop, 1500L)
                          }
                      }
                      "STOP" -> { running = false; cleanup(); stopForeground(STOP_FOREGROUND_REMOVE); stopSelf() }
                  }
                  return START_NOT_STICKY
              }
              private fun initDisplay() {
                  val wm = getSystemService(Context.WINDOW_SERVICE) as WindowManager
                  val m = DisplayMetrics()
                  @Suppress("DEPRECATION") wm.defaultDisplay.getRealMetrics(m)
                  ir = ImageReader.newInstance(m.widthPixels, m.heightPixels, PixelFormat.RGBA_8888, 2)
                  vd = proj?.createVirtualDisplay("LC", m.widthPixels, m.heightPixels, m.densityDpi,
                      DisplayManager.VIRTUAL_DISPLAY_FLAG_AUTO_MIRROR, ir?.surface, null, null)
              }
              private fun initOverlay() {
                  val wm = getSystemService(Context.WINDOW_SERVICE) as WindowManager
                  overlay = TextView(this).apply {
                      text = "Очікування субтитрів..."
                      textSize = 16f
                      setTextColor(android.graphics.Color.WHITE)
                      setBackgroundColor(android.graphics.Color.parseColor("#DD000000"))
                      setPadding(24, 14, 24, 14)
                  }
                  val type = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY
                  else @Suppress("DEPRECATION") WindowManager.LayoutParams.TYPE_PHONE
                  val p = WindowManager.LayoutParams(
                      WindowManager.LayoutParams.MATCH_PARENT, WindowManager.LayoutParams.WRAP_CONTENT, type,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE or WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL,
                      PixelFormat.TRANSLUCENT).apply { gravity = Gravity.BOTTOM or Gravity.CENTER_HORIZONTAL; y = 120 }
                  main.post { wm.addView(overlay, p) }
              }
              private fun capture() {
                  val img = try { ir?.acquireLatestImage() } catch (e: Exception) { null } ?: return
                  try {
                      val plane = img.planes[0]
                      val rp = plane.rowStride - plane.pixelStride * img.width
                      val full = Bitmap.createBitmap(img.width + rp / plane.pixelStride, img.height, Bitmap.Config.ARGB_8888)
                      full.copyPixelsFromBuffer(plane.buffer)
                      val ct = (full.height * 0.55f).toInt()
                      val ch = (full.height * 0.38f).toInt()
                      val crop = Bitmap.createBitmap(full, 0, ct, full.width, ch)
                      full.recycle()
                      ocr.process(InputImage.fromBitmap(crop, 0))
                          .addOnSuccessListener { result: Text ->
                              val txt = result.text.trim()
                              if (txt.isNotEmpty() && txt != lastTxt && txt.length > 3) {
                                  lastTxt = txt
                                  bg.post {
                                      val tr = translate(txt)
                                      main.post { overlay?.text = if (tr != txt) tr else txt }
                                  }
                              }
                              crop.recycle()
                          }
                          .addOnFailureListener { crop.recycle() }
                  } finally { img.close() }
              }
              private fun translate(txt: String): String = try {
                  val enc = URLEncoder.encode(txt.take(400), "UTF-8")
                  val url = URL("https://api.mymemory.translated.net/get?q=$enc&langpair=en|uk")
                  val c = url.openConnection() as HttpURLConnection
                  c.connectTimeout = 5000; c.readTimeout = 5000
                  val resp = c.inputStream.bufferedReader().readText(); c.disconnect()
                  JSONObject(resp).getJSONObject("responseData").getString("translatedText")
              } catch (e: Exception) { txt }
              private fun cleanup() {
                  bg.removeCallbacks(loop); vd?.release(); proj?.stop(); ir?.close(); ocr.close()
                  main.post { overlay?.let { v ->
                      try { (getSystemService(Context.WINDOW_SERVICE) as WindowManager).removeView(v) } catch (_: Exception) {}
                  }}
              }
              private fun buildNotif(): Notification {
                  val si = PendingIntent.getService(this, 0,
                      Intent(this, ScreenCaptureService::class.java).apply { action = "STOP" },
                      PendingIntent.FLAG_IMMUTABLE)
                  return NotificationCompat.Builder(this, "LS")
                      .setContentTitle("LingoStream AI").setContentText("Переклад активний")
                      .setSmallIcon(android.R.drawable.ic_dialog_info)
                      .addAction(android.R.drawable.ic_delete, "Зупинити", si)
                      .setOngoing(true).build()
              }
              override fun onBind(i: Intent?) = null
              override fun onDestroy() { running = false; cleanup(); bgt.quitSafely(); super.onDestroy() }
          }
          KOTLIN

      - name: Install dependencies
        run: flutter pub get

      - name: Generate icons
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LingoStream-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
