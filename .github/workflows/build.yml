name: Build LingoStream APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Recreate Android Project files safely
        run: |
          # 1. Тимчасово копіюємо ваш pubspec.yaml, щоб flutter create його не затер
          cp pubspec.yaml pubspec.yaml.bak
          
          # 2. Створюємо файли платформи Android
          flutter create . --platforms=android --project-name=lingostream
          
          # 3. Повертаємо ваш оригінальний повний pubspec.yaml назад
          mv pubspec.yaml.bak pubspec.yaml

      - name: Update Kotlin version for modern packages
        run: |
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' android/build.gradle
          sed -i 's/org.jetbrains.kotlin.android" version .*/org.jetbrains.kotlin.android" version "1.9.24" apply false/g' android/settings.gradle || true

      - name: Inject Android Permissions to prevent crash
        run: |
          PERMISSIONS='<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />'
          sed -i "s|<manifest.*>|<manifest xmlns:android=\"http://android.com\">\n    $PERMISSIONS|g" android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Generate App Icons
        run: |
          # Тепер пакет точно буде на місці
          dart run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lingostream-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
