name: lingostream
description: LingoStream AI - Smart Screen Translator
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP requests for API calls
  http: ^1.1.0
  
  # Get app version info
  package_info_plus: ^4.0.0
  
  # For adaptive icons (optional but recommended)
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Assets folder (create if needed)
  # assets:
  #   - assets/icon/

# Configuration for launcher icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0d0d0d"
  adaptive_icon_foreground: "assets/icon/icon.png"
  remove_alpha_ios: true
